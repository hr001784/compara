# Render Blueprint — deploy backend API
# Dashboard: https://dashboard.render.com → New → Blueprint
services:
  - type: web
    name: compara-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
      - key: CLIENT_URL
        sync: false
        # Set to your Vercel URL after deploy, e.g. https://compara.vercel.app
